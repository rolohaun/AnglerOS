name: Build Marlin from test configs

# Validates that AnglerOS-generated configs actually compile: clone Marlin at
# bugfix-2.1.x, drop each test config in, build its env. Convergence loop for the
# config generator across the supported boards.

on:
  push:
    branches: [main]
    paths:
      - 'test/**'
      - '.github/workflows/build-marlin.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: delta-skr-pico
            config: test/delta-skr-pico.config.ini
            env: SKR_Pico
          - name: cartesian-skr-mini-e3-v3
            config: test/cartesian-skr-mini-e3-v3.config.ini
            env: STM32G0B1RE_btt
          - name: cartesian-mks-monster8-v2
            config: test/cartesian-mks-monster8-v2.config.ini
            env: mks_monster8
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Clone Marlin @ bugfix-2.1.x
        run: git clone --depth 1 --branch bugfix-2.1.x https://github.com/MarlinFirmware/Marlin.git marlin-build

      - name: Apply AnglerOS config.ini
        run: cp "${{ matrix.config }}" marlin-build/Marlin/config.ini

      - name: Build env:${{ matrix.env }}
        working-directory: marlin-build
        run: pio run -e ${{ matrix.env }}

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-firmware
          path: |
            marlin-build/.pio/build/${{ matrix.env }}/*.uf2
            marlin-build/.pio/build/${{ matrix.env }}/*.bin
          if-no-files-found: warn
