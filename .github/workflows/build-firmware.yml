name: Build AnglerOS firmware & publish flasher

# Builds the ESP32-S3-CAM firmware, merges it into a single flashable image, and
# publishes the ESP Web Tools browser flasher (pages/) to GitHub Pages.

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'pages/**'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO + esptool
        run: pip install --upgrade platformio "esptool>=4.7,<5"

      - name: Compress web assets (served with Content-Encoding gzip)
        run: python scripts/gzip_fs.py firmware/data

      - name: Build firmware + LittleFS images (ESP32-S3-CAM)
        working-directory: firmware
        run: |
          pio run -e esp32s3cam
          pio run -e esp32s3cam -t buildfs

      - name: Merge into single flash image
        run: |
          python scripts/merge_bin.py --env esp32s3cam --chip esp32s3 --flash-size 16MB \
            --fs-offset 0xc90000 --out pages/firmware/angleros-esp32s3cam.bin

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
