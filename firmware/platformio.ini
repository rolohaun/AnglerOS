; AnglerOS — ESP32-CAM firmware
; Board: AI-Thinker ESP32-CAM (plain ESP32, 4MB flash, PSRAM, OV3660 camera)

[platformio]
default_envs = esp32cam
data_dir = data

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; 4MB flash: no OTA, maximise app + a LittleFS data partition for the SPA.
board_build.partitions = huge_app.csv
board_build.filesystem = littlefs

; PSRAM is required for the camera frame buffer.
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    esp32async/ESPAsyncWebServer
    esp32async/AsyncTCP
    bblanchon/ArduinoJson@^7
