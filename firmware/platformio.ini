; AnglerOS firmware for the LILYGO T-Dongle-S3.

[platformio]
default_envs = tdongles3
data_dir = data
boards_dir = boards

[common]
lib_deps =
    esp32async/ESPAsyncWebServer
    esp32async/AsyncTCP
    bblanchon/ArduinoJson@^7
    adafruit/Adafruit GFX Library@^1.12.6

[env:tdongles3]
platform = espressif32@6.12.0
board = angleros_tdongles3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs
board_upload.flash_size = 16MB

; Core 0 handles Wi-Fi/AsyncTCP and USB host tasks. The Arduino loop, including
; G-code streaming, runs on core 1.
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=0

lib_deps = ${common.lib_deps}
