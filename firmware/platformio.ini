; AnglerOS firmware
; Targets:
;   esp32cam — AI-Thinker ESP32-CAM (plain ESP32, 4MB flash, PSRAM, OV3660,
;              SD slot, printer link over UART)
;   esp32s3cam — ESP32-S3-CAM (S3-WROOM N16R8: 16MB flash, 8MB PSRAM, OV3660,
;                SD slot, dual USB-C: CH340 for programming + native USB-OTG
;                that talks to the printer's USB port, OctoPrint-style)

[platformio]
default_envs = esp32cam
data_dir = data

[common]
lib_deps =
    esp32async/ESPAsyncWebServer
    esp32async/AsyncTCP
    bblanchon/ArduinoJson@^7
    ; Improv Wi-Fi Serial — lets the ESP Web Tools installer guide the user
    ; through Wi-Fi setup over USB right after flashing.
    https://github.com/jnthas/improv-wifi-library.git

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; 4MB flash: no OTA, maximise app + a LittleFS data partition for the SPA.
board_build.partitions = huge_app.csv
board_build.filesystem = littlefs

; PSRAM is required for the camera frame buffer.
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=3
    -DANGLEROS_BOARD_CAM
    -DANGLEROS_BOARD_NAME='"ESP32-CAM"'

lib_deps = ${common.lib_deps}

[env:esp32s3cam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs
; ESP32-S3-WROOM-1 N16R8: quad-SPI flash + octal PSRAM.
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

; Console/Improv run on UART0 via the board's CH340 USB-C port, leaving the
; native USB-OTG port entirely to the printer link (printer_usb.cpp).
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DANGLEROS_BOARD_S3CAM
    -DANGLEROS_BOARD_NAME='"ESP32-S3-CAM"'

lib_deps = ${common.lib_deps}
