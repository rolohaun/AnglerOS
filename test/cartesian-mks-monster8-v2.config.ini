# AnglerOS test fixture — Cartesian on MKS Monster8 V2.0 (schema defaults).
# Board: MKS Monster8 V2.0 | Kinematics: cartesian | Marlin source tag: bugfix-2.1.x | config ref: bugfix-2.1.x

[config:base]
ini_use_config = base
MOTHERBOARD = BOARD_MKS_MONSTER8_V2
SERIAL_PORT = 1

# Base-example extras AnglerOS disables (not exposed in the UI)
PSU_CONTROL = off

# Steppers & motion
DEFAULT_AXIS_STEPS_PER_UNIT = { 80, 80, 400, 415 }
DEFAULT_MAX_FEEDRATE = { 300, 300, 8, 50 }
DEFAULT_MAX_ACCELERATION = { 3000, 3000, 100, 5000 }

# TMC2209 drivers (UART)
X_DRIVER_TYPE = TMC2209
Y_DRIVER_TYPE = TMC2209
Z_DRIVER_TYPE = TMC2209
E0_DRIVER_TYPE = TMC2209
X_CURRENT = 800
Y_CURRENT = 800
Z_CURRENT = 800
E0_CURRENT = 650
X_MICROSTEPS = 16
Y_MICROSTEPS = 16
Z_MICROSTEPS = 16
E0_MICROSTEPS = 16
STEALTHCHOP_XY = on
STEALTHCHOP_Z = on
STEALTHCHOP_E = on

# Bed volume
X_BED_SIZE = 220
Y_BED_SIZE = 220
Z_MAX_POS = 250

# Hotend
TEMP_SENSOR_0 = 1
HEATER_0_MAXTEMP = 275

# Heated bed
TEMP_SENSOR_BED = 1
BED_MAXTEMP = 120

# Extruder & filament
EXTRUDERS = 1
DEFAULT_NOMINAL_FILAMENT_DIA = 1.75
EXTRUDE_MINTEMP = 170

# Temperature control
PIDTEMP = on
PIDTEMPBED = off
