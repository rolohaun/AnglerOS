# AnglerOS test fixture — mirrors config.js output for a Delta + SKR Pico with
# schema defaults. CI (build-marlin.yml) builds this against Marlin to prove the
# generated configuration compiles. Keep in sync with firmware/data/config.js +
# printer.schema.json.
# Board: BigTreeTech SKR Pico | Kinematics: delta | Marlin source tag: bugfix-2.1.x | config ref: bugfix-2.1.x

[config:base]
ini_use_config = example/delta/generic @ bugfix-2.1.x, base
MOTHERBOARD = BOARD_BTT_SKR_PICO
SERIAL_PORT = -1
SERIAL_PORT_2 = 0

# Base-example extras AnglerOS disables (not exposed in the UI)
PSU_CONTROL = off

# Steppers & motion
DEFAULT_AXIS_STEPS_PER_UNIT = { 80, 80, 80, 415 }
DEFAULT_MAX_FEEDRATE = { 200, 200, 200, 50 }
DEFAULT_MAX_ACCELERATION = { 3000, 3000, 3000, 5000 }

# TMC2209 drivers (UART)
X_DRIVER_TYPE = TMC2209
Y_DRIVER_TYPE = TMC2209
Z_DRIVER_TYPE = TMC2209
E0_DRIVER_TYPE = TMC2209
X_CURRENT = 800
Y_CURRENT = 800
Z_CURRENT = 800
E0_CURRENT = 650
X_MICROSTEPS = 16
Y_MICROSTEPS = 16
Z_MICROSTEPS = 16
E0_MICROSTEPS = 16
STEALTHCHOP_XY = on
STEALTHCHOP_Z = on
STEALTHCHOP_E = on

# Delta geometry
DELTA_DIAGONAL_ROD = 215
DELTA_RADIUS = 105
PRINTABLE_RADIUS = 90
DELTA_HEIGHT = 250
DEFAULT_SEGMENTS_PER_SECOND = 200
DELTA_ENDSTOP_ADJ = { 0, 0, 0 }
DELTA_TOWER_ANGLE_TRIM = { 0, 0, 0 }

# Hotend
TEMP_SENSOR_0 = 1
HEATER_0_MAXTEMP = 275

# Heated bed
TEMP_SENSOR_BED = 1
BED_MAXTEMP = 120

# Extruder & filament
EXTRUDERS = 1
DEFAULT_NOMINAL_FILAMENT_DIA = 1.75
EXTRUDE_MINTEMP = 170

# Temperature control
PIDTEMP = on
PIDTEMPBED = off
